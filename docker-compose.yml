services:
  postgres:
    image: postgres:16
    container_name: mfos-outbound-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mfos_outbound
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mfos_outbound"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pgdata:
